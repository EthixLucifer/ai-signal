<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Signal</title>

<style>
:root {
  --bg: #f7f7f8;
  --sidebar: #ffffff;
  --card: #ffffff;
  --border: #e5e5e7;
  --border2: #ececf0;

  --text: #111;
  --sub: #6b7280;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  padding:20px;
}

.logo{
  font-weight:700;
  margin-bottom:20px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  padding:16px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

.content{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

.card-header{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  font-weight:600;
  font-size:14px;
}

.item{
  padding:10px 14px;
  border-bottom:1px solid var(--border2);
  font-size:13px;
  text-decoration:none;
  color:inherit;
  display:block;
}

.item:last-child{border-bottom:none;}

.item:hover{
  background:#f3f4f6;
}

.time{
  font-size:11px;
  color:var(--sub);
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">AI Signal</div>
  <button onclick="loadAll()">Refresh</button>
</div>

<div class="main">
  <div class="topbar">
    <div>AI Dashboard</div>
    <div id="clock"></div>
  </div>

  <div class="content" id="feeds">Loading...</div>
</div>

<script>
// ✅ PROXIES (FIXED)
const PROXIES = [
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`
];

async function fetchProxy(url){
  for(const p of PROXIES){
    try{
      const res = await fetch(p(url));
      if(res.ok){
        const txt = await res.text();
        if(txt.length > 100) return txt;
      }
    }catch(e){}
  }
  throw new Error("All proxies failed");
}

// SOURCES
const SOURCES = [
  {name:"HuggingFace", url:"https://huggingface.co/blog/feed.xml"},
  {name:"arXiv", url:"https://rss.arxiv.org/rss/cs.LG"},
  {name:"OpenAI", url:"https://openai.com/news/rss.xml"},
  {name:"DeepMind", url:"https://deepmind.google/blog/rss.xml"}
];

// PARSE
function parse(xml){
  const doc = new DOMParser().parseFromString(xml,"text/xml");
  const items = [...doc.querySelectorAll("item,entry")];

  return items.map(i=>({
    title:i.querySelector("title")?.textContent || "No title",
    link:i.querySelector("link")?.getAttribute("href") || i.querySelector("link")?.textContent || "#",
    date:i.querySelector("pubDate,updated")?.textContent
  })).slice(0,3);
}

// TIME FORMAT
function timeAgo(d){
  if(!d) return "";
  const diff=(Date.now()-new Date(d))/1000;
  if(diff<3600) return Math.floor(diff/60)+"m ago";
  if(diff<86400) return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

// LOAD ALL
async function loadAll(){
  const container=document.getElementById("feeds");
  container.innerHTML="Loading...";

  let html="";

  for(const s of SOURCES){
    try{
      const raw=await fetchProxy(s.url);
      const items=parse(raw);

      html+=`
      <div class="card">
        <div class="card-header">${s.name}</div>
        ${items.map(i=>`
          <a class="item" href="${i.link}" target="_blank">
            ${i.title}
            <div class="time">${timeAgo(i.date)}</div>
          </a>
        `).join("")}
      </div>`;
    }catch(e){
      html+=`
      <div class="card">
        <div class="card-header">${s.name}</div>
        <div class="item">Failed to load</div>
      </div>`;
    }
  }

  // GitHub trending
  try{
    const res=await fetch("https://api.github.com/search/repositories?q=machine-learning&sort=stars&order=desc&per_page=3");
    const data=await res.json();

    html+=`
    <div class="card">
      <div class="card-header">GitHub</div>
      ${data.items.map(r=>`
        <a class="item" href="${r.html_url}" target="_blank">
          ${r.full_name}
          <div class="time">${r.stargazers_count} ★</div>
        </a>
      `).join("")}
    </div>`;
  }catch(e){}

  container.innerHTML=html;
}

// CLOCK
setInterval(()=>{
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
},1000);

// INIT
loadAll();
</script>

</body>
</html>
